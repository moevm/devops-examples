{% extends "base.html" %}
{% block title %}{% if task %}Редактировать задачу{% else %}Новая задача{% endif %}{% endblock %}
{% block content %}

<h2 style="margin-bottom:20px;">{% if task %}Редактировать задачу{% else %}Новая задача{% endif %}</h2>

{% if error %}
  <div class="error">{{ error }}</div>
{% endif %}

<div class="card">
  <form method="post">
    <div class="form-group">
      <label for="title">Название *</label>
      <input type="text" id="title" name="title" placeholder="Введите название задачи"
             value="{{ task.title if task else '' }}" maxlength="200">
    </div>
    <div class="form-group">
      <label for="description">Описание</label>
      <textarea id="description" name="description" placeholder="Подробное описание задачи">{{ task.description if task else '' }}</textarea>
    </div>
    <div style="display:flex; gap:16px;">
      <div class="form-group" style="flex:1;">
        <label for="priority">Приоритет</label>
        <select id="priority" name="priority">
          <option value="low" {% if task and task.priority=='low' %}selected{% endif %}>Низкий</option>
          <option value="medium" {% if not task or task.priority=='medium' %}selected{% endif %}>Средний</option>
          <option value="high" {% if task and task.priority=='high' %}selected{% endif %}>Высокий</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;">
        <label for="due_date">Срок выполнения</label>
        <input type="date" id="due_date" name="due_date" value="{{ task.due_date if task else '' }}">
      </div>
    </div>
    <div style="display:flex; gap:10px;">
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="{% if task %}/task/{{ task.id }}{% else %}/{% endif %}" class="btn btn-secondary">Отмена</a>
    </div>
  </form>
</div>

{% endblock %}
